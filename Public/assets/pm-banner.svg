    <path d="M592 390C715 254 819 218 972 218H1026L960 284H914C825 284 756 309 680 390H592Z"
          fill="none" stroke="#f4f7fb" stroke-width="3" stroke-dasharray="14 16" stroke-linecap="round"/>
  </g>

  <g fill="#f7f9fc" font-family="Space Grotesk, Arial, sans-serif">
    <text x="566" y="116" font-size="60" font-weight="700">Paddock Manager</text>
    <text x="566" y="156" font-size="28" fill="#b9c4d4">Gestion des Grands Prix, ecuries et pilotes</text>
  </g>

  <g font-family="Space Grotesk, Arial, sans-serif" font-size="24">
    <rect x="566" y="434" width="174" height="52" rx="14" fill="#1f2d42" stroke="#324866"/>
    <text x="594" y="467" fill="#d4deee">Live timing</text>

    <rect x="756" y="434" width="186" height="52" rx="14" fill="#1f2d42" stroke="#324866"/>
