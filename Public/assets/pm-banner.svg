<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="Banniere Paddock Manager">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1826"/>
      <stop offset="100%" stop-color="#0a111d"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0.12" cy="0.58" r="0.72">
      <stop offset="0%" stop-color="#2f77ff" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#2f77ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRed" cx="0.95" cy="0.1" r="0.65">
      <stop offset="0%" stop-color="#ff321f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff321f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0.5" y2="0.5">
      <stop offset="0%" stop-color="#e10600"/>
      <stop offset="100%" stop-color="#ff5f4a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
