    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#02060e" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="40" fill="url(#bg)"/>
  <rect width="1200" height="560" rx="40" fill="url(#grid)"/>
  <rect width="1200" height="560" rx="40" fill="url(#glowBlue)"/>
  <rect width="1200" height="560" rx="40" fill="url(#glowRed)"/>

  <g filter="url(#shadow)">
    <rect x="52" y="58" width="450" height="444" rx="28" fill="#121c2b" stroke="#2a3d5a" stroke-width="2"/>
    <rect x="52" y="58" width="450" height="170" rx="28" fill="url(#glass)"/>

    <path d="M122 384V170H264C325 170 360 203 360 252C360 301 325 334 264 334H202V384Z" fill="#e9eef8"/>
    <path d="M202 269H260C277 269 286 262 286 250C286 238 277 231 260 231H202Z" fill="#121c2b"/>
    <path d="M396 384V170H472L538 279L604 170H680V384H606V287L552 367H523L469 287V384Z" fill="#e9eef8"/>

    <text x="84" y="452" fill="#aeb9cb" font-size="28" font-family="Space Grotesk, Arial, sans-serif">Paddock Manager</text>
  </g>

  <g filter="url(#shadow)">
    <path d="M570 390C706 230 823 178 994 178H1090L990 300H930C835 300 762 326 680 396H570Z"
